<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }
    .glb-logo {
      font-size: 96px;
      font-weight: 700;
      color: white;
      margin-bottom: 20px;
      letter-spacing: 8px;
    }
    .glb-subtitle {
      font-size: 18px;
      color: #9C27B0;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 32px;
      font-weight: 400;
      color: #888;
      text-align: center;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      color: #555;
      text-align: center;
    }
    .badge {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-size: 14px;
      color: #444;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="glb-logo">GLB</div>
  <div class="glb-subtitle">Canvas Game</div>
  <h1>Fast-Paced Browser Action</h1>
  <p>Challenge your reflexes and skills</p>
  <div class="badge">glb.buttsstudios.com</div>
</body>
</html>
